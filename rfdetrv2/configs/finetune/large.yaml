# Fine-tune — large (RFDETRLargeConfig)
# Loads COCO checkpoint via pretrain_weights alias (HF → rfdetr_pretrained/).
# Tweak train.freeze_encoder / freeze_decoder / freeze_detection_head and learning rates as needed.
# Large ViT-L backbone: supply pretrained_encoder or local dinov3_vitl16*.pth if missing.

model:
  vit_encoder_num_layers: 12
  window_block_indexes: null
  position_embedding: sine
  out_feature_indexes:
  - 2
  - 5
  - 8
  - 11
  freeze_encoder: true
  freeze_decoder: false
  freeze_detection_head: false
  layer_norm: true
  rms_norm: false
  backbone_lora: false
  force_no_pretrain: false
  dec_layers: 3
  dim_feedforward: 2048
  hidden_dim: 256
  sa_nheads: 8
  ca_nheads: 16
  num_queries: 300
  group_detr: 13
  two_stage: true
  projector_scale:
  - P3
  - P4
  - P5
  lite_refpoint_refine: true
  num_select: 300
  dec_n_points: 8
  decoder_norm: LN
  bbox_reparam: true
  freeze_batch_norm: false
  patch_size: 16
  use_windowed_attn: false
  use_convnext_projector: true
  gradient_checkpointing: false
  segmentation_head: false
  mask_downsample_ratio: 4
  mask_point_sample_ratio: 16
  mask_ce_loss_coef: 5.0
  mask_dice_loss_coef: 5.0
  eval_max_dets: 500
  use_rope: true
  encoder: dinov3_large
  resolution: 640
  num_windows: 4
  positional_encoding_size: 35
train:
  num_classes: 90
  grad_accum_steps: 1
  amp: false
  lr: 0.0001
  lr_encoder: 1.25e-05
  lr_scale_mode: sqrt
  batch_size: 2
  weight_decay: 0.0001
  epochs: 24
  lr_drop: 11
  clip_max_norm: 0.1
  lr_vit_layer_decay: 0.8
  lr_component_decay: 1.0
  do_benchmark: false
  dropout: 0.0
  drop_path: 0.0
  drop_mode: standard
  drop_schedule: constant
  cutoff_epoch: 0
  pretrained_encoder: null
  pretrain_exclude_keys: null
  pretrain_keys_modify_to_load: null
  pretrained_distiller: null
  set_cost_class: 2.0
  set_cost_bbox: 5.0
  set_cost_giou: 2.0
  cls_loss_coef: 1.0
  bbox_loss_coef: 5.0
  giou_loss_coef: 2.0
  focal_alpha: 0.25
  aux_loss: true
  sum_group_losses: false
  use_varifocal_loss: false
  use_position_supervised_loss: false
  ia_bce_loss: true
  use_prototype_align: true
  prototype_loss_coef: 0.1
  prototype_momentum: 0.999
  prototype_warmup_steps: 200
  prototype_temperature: 0.1
  prototype_repulsion_coef: 0.1
  prototype_use_freq_weight: true
  prototype_use_quality_weight: true
  prototype_use_repulsion: true
  dataset_file: coco
  coco_path: null
  dataset_dir: null
  square_resize_div_64: false
  dont_save_weights: false
  checkpoint_interval: 10
  seed: 42
  resume: ''
  start_epoch: 0
  eval: false
  use_ema: false
  ema_decay: 0.9997
  ema_tau: 0
  num_workers: 2
  warmup_epochs: 0.5
  lr_scheduler: step
  lr_milestones:
  - 80
  - 160
  lr_gamma: 0.1
  lr_min_factor: 0.05
  lr_stable_ratio: 0.7
  lr_restart_period: 50
  lr_restart_decay: 0.8
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  early_stopping_use_ema: false
  debug_data_limit: 0
  multi_scale: false
  expanded_scales: false
  do_random_resize_via_padding: false
  use_cls_token: false
  encoder_only: false
  backbone_only: false
  fp16_eval: false
  freeze_encoder: true
  freeze_decoder: false
  freeze_detection_head: false
  use_convnext_projector: true
  tensorboard: false
  wandb: false
  pretrain_weights: rfdetrv2_large
  output_dir: output/finetune_large
system:
  device: cuda
  world_size: 1
  dist_url: env://
  sync_bn: true
  rank: 0
  gpu: 0
  distributed: false
  dist_backend: nccl
  subcommand: null
  class_names: null
  label_to_cat_id: null
  num_feature_levels: null
  shape: null
  infer_dir: null
  verbose: false
  opset_version: 17
  simplify: false
  tensorrt: false
  dry_run: false
  profile: false
  no_use_convnext_projector: false
